<svg width="1024" height="700" viewBox="0 0 1024 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="glow-cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(34,211,238,0.05)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.10)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0.05)"/>
    </linearGradient>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="shadow-lg">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <linearGradient id="wsl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(8,51,68,0.20)"/>
      <stop offset="100%" stop-color="rgba(8,51,68,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="700" fill="url(#bg-grad)"/>
  <rect width="1024" height="700" fill="url(#grid)"/>

  <!-- ============================================ -->
  <!-- Windows Host Boundary -->
  <!-- ============================================ -->
  <rect x="25" y="25" width="974" height="650" rx="18" fill="rgba(251,191,36,0.04)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#shadow-sm)"/>
  <rect x="25" y="25" width="974" height="650" rx="18" fill="url(#glow-cyan)" stroke="none"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="45" y="52" font-size="11" fill="#fbbf24" font-weight="600">Windows 11 宿主机（ASUS-CHENHUI）</text>

  <!-- Title -->
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="512" y="22" font-size="14" fill="#e2e8f0" font-weight="700" text-anchor="middle" letter-spacing="2">Hermes Agent on WSL — 系统架构</text>

  <!-- ============================================ -->
  <!-- WSL Zone -->
  <!-- ============================================ -->
  <rect x="50" y="70" width="620" height="580" rx="14" fill="url(#wsl-bg)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,4"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="70" y="95" font-size="10" fill="#22d3ee" font-weight="500">WSL 2 — Ubuntu 22.04</text>

  <!-- ============================================ -->
  <!-- 1. WeChat Gateway -->
  <!-- ============================================ -->
  <rect x="85" y="120" width="220" height="90" rx="10" fill="#0f172a" filter="url(#shadow-lg)"/>
  <rect x="85" y="120" width="220" height="90" rx="10" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="1.5"/>
  <text font-family="JetBrains Mono, monospace" x="195" y="150" font-size="12" fill="#22d3ee" font-weight="700" text-anchor="middle">WeChat Gateway</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="195" y="168" font-size="9" fill="#94a3b8" text-anchor="middle">微信消息网关（常驻后台）</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="195" y="184" font-size="8" fill="#64748b" text-anchor="middle">接收 / 转发消息 · PID: 35240</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="195" y="200" font-size="7" fill="#475569" text-anchor="middle">ilink Bot 协议</text>

  <!-- Arrow Gateway → Agent -->
  <line x1="305" y1="165" x2="370" y2="165" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- ============================================ -->
  <!-- 2. Hermes Agent -->
  <!-- ============================================ -->
  <rect x="380" y="110" width="260" height="100" rx="10" fill="#0f172a" filter="url(#shadow-lg)"/>
  <rect x="380" y="110" width="260" height="100" rx="10" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="1.5"/>
  <text font-family="JetBrains Mono, monospace" x="510" y="140" font-size="13" fill="#34d399" font-weight="700" text-anchor="middle">Hermes Agent</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="510" y="158" font-size="9" fill="#94a3b8" text-anchor="middle">AI 助手核心引擎</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="510" y="174" font-size="8" fill="#64748b" text-anchor="middle">工具调用 · 跨会话记忆 · 技能系统</text>
  <text font-family="JetBrains Mono, monospace" x="510" y="200" font-size="7" fill="#475569" text-anchor="middle">max_turns: 100 · timeout: 600s</text>

  <!-- Arrow Agent → Browser -->
  <line x1="510" y1="215" x2="510" y2="270" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>

  <!-- ============================================ -->
  <!-- 3. Camoufox Browser -->
  <!-- ============================================ -->
  <rect x="380" y="280" width="260" height="95" rx="10" fill="#0f172a" filter="url(#shadow-lg)"/>
  <rect x="380" y="280" width="260" height="95" rx="10" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1.5"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="510" y="308" font-size="12" fill="#a78bfa" font-weight="700" text-anchor="middle">Camoufox 反爬浏览器</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="510" y="326" font-size="9" fill="#94a3b8" text-anchor="middle">魔改 Firefox + 动态指纹随机化</text>
  <text font-family="JetBrains Mono, monospace" x="510" y="344" font-size="8" fill="#64748b" text-anchor="middle">camofox-browser REST API :9377</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="510" y="362" font-size="7" fill="#475569" text-anchor="middle">绕过百度 / Google / 天气网反爬检测</text>

  <!-- Arrow Browser → Web -->
  <line x1="640" y1="300" x2="710" y2="300" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-violet)"/>

  <!-- ============================================ -->
  <!-- 4. External Web Services -->
  <!-- ============================================ -->
  <rect x="720" y="260" width="240" height="120" rx="10" fill="#0f172a" filter="url(#shadow-lg)"/>
  <rect x="720" y="260" width="240" height="120" rx="10" fill="rgba(148,163,184,0.06)" stroke="#64748b" stroke-width="1.5"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="840" y="285" font-size="11" fill="#94a3b8" font-weight="600" text-anchor="middle">外部 Web 服务</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="840" y="308" font-size="9" fill="#64748b" text-anchor="middle">Baidu · Google · Weather.com.cn</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="840" y="325" font-size="9" fill="#64748b" text-anchor="middle">xuchenhui.cc（本博客）</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="840" y="348" font-size="8" fill="#475569" text-anchor="middle">之前默认 Playwright 全部被拦</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="840" y="365" font-size="8" fill="#22d3ee" text-anchor="middle">⇢ Camoufox 后全部正常访问</text>

  <!-- ============================================ -->
  <!-- 5. Watchdog System -->
  <!-- ============================================ -->
  <rect x="50" y="410" width="530" height="185" rx="12" fill="rgba(251,113,133,0.04)" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="75" y="435" font-size="10" fill="#fb7185" font-weight="600">三层保活系统（Watchdog）</text>

  <!-- Layer 3 -->
  <rect x="80" y="455" width="150" height="60" rx="8" fill="#0f172a" filter="url(#shadow-sm)"/>
  <rect x="80" y="455" width="150" height="60" rx="8" fill="rgba(251,113,133,0.08)" stroke="#fb7185" stroke-width="1.5"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="155" y="478" font-size="10" fill="#fb7185" font-weight="600" text-anchor="middle">层 3 · Windows 计划任务</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="155" y="496" font-size="8" fill="#94a3b8" text-anchor="middle">每 5 分钟兜底检查</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="155" y="508" font-size="7" fill="#64748b" text-anchor="middle">HermesWatchdogCheck</text>

  <!-- Arrow L3 → L2 -->
  <line x1="230" y1="485" x2="250" y2="485" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- Layer 2 -->
  <rect x="260" y="455" width="150" height="60" rx="8" fill="#0f172a" filter="url(#shadow-sm)"/>
  <rect x="260" y="455" width="150" height="60" rx="8" fill="rgba(251,113,133,0.08)" stroke="#fb7185" stroke-width="1.5"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="335" y="478" font-size="10" fill="#fb7185" font-weight="600" text-anchor="middle">层 2 · VBS 启动器</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="335" y="496" font-size="8" fill="#94a3b8" text-anchor="middle">Windows Startup 触发</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="335" y="508" font-size="7" fill="#64748b" text-anchor="middle">静默启动无窗口</text>

  <!-- Arrow L2 → L1 -->
  <line x1="410" y1="485" x2="430" y2="485" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- Layer 1 -->
  <rect x="440" y="455" width="120" height="60" rx="8" fill="#0f172a" filter="url(#shadow-sm)"/>
  <rect x="440" y="455" width="120" height="60" rx="8" fill="rgba(251,113,133,0.08)" stroke="#fb7185" stroke-width="1.5"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="500" y="478" font-size="10" fill="#fb7185" font-weight="600" text-anchor="middle">层 1 · PS1 脚本</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="500" y="496" font-size="8" fill="#94a3b8" text-anchor="middle">自循环守护进程</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="500" y="508" font-size="7" fill="#64748b" text-anchor="middle">每 5 分钟检查</text>

  <!-- Watchdog → Gateway arrow -->
  <line x1="155" y1="518" x2="195" y2="215" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-rose)"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="115" y="380" font-size="8" fill="#fb7185" transform="rotate(-78, 115, 380)">监控 WSL + Gateway 状态，异常自愈</text>

  <!-- ============================================ -->
  <!-- 6. User on Phone -->
  <!-- ============================================ -->
  <rect x="610" y="440" width="360" height="130" rx="14" fill="#0f172a" filter="url(#shadow-lg)"/>
  <rect x="610" y="440" width="360" height="130" rx="14" fill="rgba(148,163,184,0.06)" stroke="#64748b" stroke-width="1.5"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="790" y="470" font-size="14" fill="#f1f5f9" font-weight="700" text-anchor="middle">📱 用户（手机通过微信操控）</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="790" y="494" font-size="10" fill="#94a3b8" text-anchor="middle">发送指令 · 接收截图 · 语音播报结果</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="790" y="514" font-size="9" fill="#64748b" text-anchor="middle">无论身在何处，掏出手机就能操作电脑</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="790" y="540" font-size="9" fill="#22d3ee" text-anchor="middle">查天气 · 搜 Google · 管理代码 · 写博客</text>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="790" y="558" font-size="12" fill="#64748b" text-anchor="middle">躺沙发也能干活 ✨</text>

  <!-- Arrow Phone → Gateway -->
  <path d="M 610 500 Q 500 500 310 220" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-cyan)" opacity="0.6"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="440" y="370" font-size="8" fill="#22d3ee" transform="rotate(-45, 440, 370)">微信消息双向通信</text>

  <!-- ============================================ -->
  <!-- Config Panel -->
  <!-- ============================================ -->
  <rect x="720" y="70" width="260" height="175" rx="10" fill="#0f172a" filter="url(#shadow-sm)"/>
  <rect x="720" y="70" width="260" height="175" rx="10" fill="rgba(52,211,153,0.03)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="740" y="95" font-size="9" fill="#34d399" font-weight="500">⚙ 关键配置 ~/.hermes/config.yaml</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="115" font-size="8" fill="#94a3b8">agent.max_turns: 100</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="130" font-size="8" fill="#94a3b8">terminal.timeout: 600s</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="145" font-size="8" fill="#94a3b8">gateway_timeout: 1800s</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="160" font-size="8" fill="#94a3b8">display.language: zh</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="175" font-size="8" fill="#94a3b8">browser.engine: auto</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="190" font-size="8" fill="#94a3b8">camofox.managed_persistence: false</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="205" font-size="8" fill="#94a3b8">approvals.mode: manual</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="225" font-size="7" fill="#475569">CAMOFOX_URL=http://localhost:9377</text>
  <text font-family="JetBrains Mono, monospace" x="735" y="238" font-size="7" fill="#475569">WEIXIN_ACCOUNT=...  (in .env)</text>

  <!-- ============================================ -->
  <!-- Legend -->
  <!-- ============================================ -->
  <rect x="610" y="585" width="370" height="60" rx="10" fill="#0f172a" filter="url(#shadow-sm)"/>
  <rect x="610" y="585" width="370" height="60" rx="10" fill="rgba(30,41,59,0.4)" stroke="#334155" stroke-width="1"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="630" y="606" font-size="9" fill="#94a3b8" font-weight="500">图例</text>
  <rect x="632" y="618" width="12" height="12" rx="3" fill="rgba(34,211,238,0.20)" stroke="#22d3ee" stroke-width="1"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="650" y="628" font-size="8" fill="#64748b">网关 / 通信</text>
  <rect x="720" y="618" width="12" height="12" rx="3" fill="rgba(52,211,153,0.20)" stroke="#34d399" stroke-width="1"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="738" y="628" font-size="8" fill="#64748b">核心引擎</text>
  <rect x="804" y="618" width="12" height="12" rx="3" fill="rgba(167,139,250,0.20)" stroke="#a78bfa" stroke-width="1"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="822" y="628" font-size="8" fill="#64748b">浏览器</text>
  <rect x="882" y="618" width="12" height="12" rx="3" fill="rgba(251,113,133,0.20)" stroke="#fb7185" stroke-width="1"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="900" y="628" font-size="8" fill="#64748b">监控 / 保活</text>
  <rect x="632" y="635" width="12" height="12" rx="3" fill="rgba(148,163,184,0.10)" stroke="#64748b" stroke-width="1"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="650" y="643" font-size="8" fill="#64748b">外部服务</text>
  <rect x="720" y="635" width="12" height="12" rx="3" fill="rgba(251,191,36,0.10)" stroke="#fbbf24" stroke-width="1"/>
  <text font-family="WenQuanYi Zen Hei, sans-serif" x="738" y="643" font-size="8" fill="#64748b">宿主机边界</text>
</svg>
